repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: no-raw-getenv
        name: disallow raw environment access outside settings
        entry: python scripts/check_no_raw_getenv.py
        language: system
        pass_filenames: false
